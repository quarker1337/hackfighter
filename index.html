<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Stoat Fighter 2</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":26699140,"index.wasm":37695054},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('notice');
		statusNotice.innerHTML = '<strong>HACKFIGHTER</strong><br>CLICK / PRESS ENTER TO ENABLE AUDIO';
		statusNotice.style.backgroundColor = '#061214';
		statusNotice.style.borderColor = '#00f0d0';
		statusNotice.style.color = '#dff';
		statusOverlay.style.cursor = 'pointer';
		window.hackfighterAudioContexts = window.hackfighterAudioContexts || [];
		const hackfighterAudioContexts = window.hackfighterAudioContexts;
		function installHackfighterAudioUnlock(name) {
			const OriginalAudioContext = window[name];
			if (!OriginalAudioContext || OriginalAudioContext.__hackfighterWrapped) return;
			function HackfighterAudioContext(...args) {
				const ctx = new OriginalAudioContext(...args);
				hackfighterAudioContexts.push(ctx);
				return ctx;
			}
			HackfighterAudioContext.prototype = OriginalAudioContext.prototype;
			Object.setPrototypeOf(HackfighterAudioContext, OriginalAudioContext);
			HackfighterAudioContext.__hackfighterWrapped = true;
			window[name] = HackfighterAudioContext;
		}
		function resumeHackfighterAudio() {
			for (const ctx of hackfighterAudioContexts) {
				if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
			}
		}
		installHackfighterAudioUnlock('AudioContext');
		installHackfighterAudioUnlock('webkitAudioContext');
		['pointerdown', 'pointerup', 'click', 'touchend', 'keydown'].forEach((eventName) => {
			window.addEventListener(eventName, resumeHackfighterAudio, { passive: true });
		});


		// Low-level output bridge only. Sound timing still comes from Godot SoundManager.
		const hackfighterAudioBridgeUrls = {"blocked": "audio_bridge/blocked.wav", "draw": "audio_bridge/draw.mp3", "fierce_hit": "audio_bridge/fierce_hit.wav", "fight": "audio_bridge/fight.mp3", "fight_alt": "audio_bridge/fight_alt.mp3", "fight_theme_1": "audio_bridge/fight_theme_1.ogg", "fight_theme_2": "audio_bridge/fight_theme_2.ogg", "fight_theme_3": "audio_bridge/fight_theme_3.ogg", "fight_theme_4": "audio_bridge/fight_theme_4.ogg", "grunt1": "audio_bridge/grunt1.wav", "grunt2": "audio_bridge/grunt2.wav", "hard_attack": "audio_bridge/hard_attack.wav", "hit_ground": "audio_bridge/hit_ground.wav", "jab_hit": "audio_bridge/jab_hit.wav", "ko_lobster": "audio_bridge/ko_lobster.wav", "ko_male": "audio_bridge/ko_male.wav", "ko_no_idea": "audio_bridge/ko_no_idea.wav", "landing": "audio_bridge/landing.wav", "light_attack": "audio_bridge/light_attack.wav", "medium_attack": "audio_bridge/medium_attack.wav", "menu_cursor": "audio_bridge/menu_cursor.wav", "menu_open": "audio_bridge/menu_open.wav", "menu_select": "audio_bridge/menu_select.wav", "menu_theme": "audio_bridge/menu_theme.ogg", "p1_wins": "audio_bridge/p1_wins.mp3", "p2_wins": "audio_bridge/p2_wins.mp3", "perfect": "audio_bridge/perfect.mp3", "ready": "audio_bridge/ready.mp3", "round_one": "audio_bridge/round_one.mp3", "round_three": "audio_bridge/round_three.mp3", "round_two": "audio_bridge/round_two.mp3", "roundhouse_hit": "audio_bridge/roundhouse_hit.wav", "short_hit": "audio_bridge/short_hit.wav", "special_lobster_1": "audio_bridge/special_lobster_1.mp3", "special_lobster_2": "audio_bridge/special_lobster_2.mp3", "special_teknium_1": "audio_bridge/special_teknium_1.mp3", "special_teknium_2": "audio_bridge/special_teknium_2.mp3", "you_lose": "audio_bridge/you_lose.mp3", "you_win": "audio_bridge/you_win.mp3"};
		let hackfighterGameAudioBridge = null;
		function startHackfighterGameAudioBridge() {
			if (hackfighterGameAudioBridge) return;
			const bank = {};
			const active = [];
			let music = null;
			let musicFadeTimer = null;
			function play(name, volume = 1.0) {
				const url = hackfighterAudioBridgeUrls[name];
				if (!url) return false;
				try {
					const a = new Audio(url);
					a.preload = 'auto';
					a.volume = Math.max(0, Math.min(1, volume));
					a.addEventListener('ended', () => { const i = active.indexOf(a); if (i >= 0) active.splice(i, 1); }, { once: true });
					active.push(a);
					bank[name] = (bank[name] || 0) + 1;
					a.play().catch(() => {});
					return true;
				} catch (e) { console.warn('Hackfighter audio bridge failed', name, e); return false; }
			}
			function playMusic(name, volume = 1.0, fadeSeconds = 0.0) {
				const url = hackfighterAudioBridgeUrls[name];
				if (!url) return false;
				try {
					stopMusic();
					music = new Audio(url);
					music.dataset.name = name;
					music.loop = true;
					music.preload = 'auto';
					const targetVolume = Math.max(0, Math.min(1, volume));
					const fadeMs = Math.max(0, fadeSeconds * 1000);
					music.volume = fadeMs > 0 ? 0 : targetVolume;
					music.play().catch(() => {});
					if (fadeMs > 0) {
						const startedAt = performance.now();
						musicFadeTimer = window.setInterval(() => {
							if (!music) return;
							const t = Math.min(1, (performance.now() - startedAt) / fadeMs);
							music.volume = targetVolume * (1 - Math.pow(1 - t, 2));
							if (t >= 1) { window.clearInterval(musicFadeTimer); musicFadeTimer = null; }
						}, 50);
					}
					bank[name] = (bank[name] || 0) + 1;
					return true;
				} catch (e) { console.warn('Hackfighter music bridge failed', name, e); return false; }
			}
			function stopMusic() {
				if (musicFadeTimer) { window.clearInterval(musicFadeTimer); musicFadeTimer = null; }
				if (music) { music.pause(); music.currentTime = 0; music = null; }
			}
			hackfighterGameAudioBridge = { play, playMusic, stopMusic, bank, active, urls: hackfighterAudioBridgeUrls };
			window.hackfighterGameAudioBridge = hackfighterGameAudioBridge;
			window.hackfighterPlayGameSound = play;
			window.hackfighterPlayGameMusic = playMusic;
			window.hackfighterStopGameMusic = stopMusic;
		}

		let started = false;
		function launchGame() {
			if (started) return;
			started = true;
			statusOverlay.style.cursor = 'default';
			setStatusMode('progress');
			startHackfighterGameAudioBridge();
			engine.startGame({
				'onProgress': function (current, total) {
					if (current > 0 && total > 0) {
						statusProgress.value = current;
						statusProgress.max = total;
					} else {
						statusProgress.removeAttribute('value');
						statusProgress.removeAttribute('max');
					}
				},
			}).then(() => {
				setStatusMode('hidden');
				const canvas = document.getElementById('canvas');
				if (canvas) canvas.focus();
				resumeHackfighterAudio();
				setTimeout(resumeHackfighterAudio, 250);
				setTimeout(resumeHackfighterAudio, 1000);
			}, displayFailureNotice);
		}
		statusOverlay.addEventListener('pointerdown', launchGame, { once: true });
		window.addEventListener('keydown', function (event) {
			if (event.key === 'Enter' || event.key === ' ') launchGame();
		}, { once: true });
	}
}());
		</script>
	</body>
</html>
